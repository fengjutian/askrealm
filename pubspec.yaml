name: ask_realm
description: 中国影视角色风格问答 App — 问于戏中，角色作答。
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.2
  
  # 网络请求
  http: ^1.2.1
  
  # 本地存储
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: fonts/NotoSansSC-Regular.ttf
        - asset: fonts/NotoSansSC-Bold.ttf
          weight: 700
